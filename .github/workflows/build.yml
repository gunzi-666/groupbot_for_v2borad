name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o v2board-tg-bot-linux-amd64 ./cmd/bot

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o v2board-tg-bot-linux-arm64 ./cmd/bot

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o v2board-tg-bot-windows-amd64.exe ./cmd/bot

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            v2board-tg-bot-linux-amd64
            v2board-tg-bot-linux-arm64
            v2board-tg-bot-windows-amd64.exe
            configs/config.example.yaml
          generate_release_notes: true
